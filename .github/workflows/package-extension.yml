name: Package Firefox Extension

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        
    - name: Install web-ext
      run: npm install -g web-ext
      
    - name: Get extension version
      id: version
      run: |
        VERSION=$(python3 -c 'import json; print(json.load(open("manifest.json", encoding="utf-8"))["version"])')
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Extension version: $VERSION"

    - name: Validate release tag
      if: ${{ startsWith(github.ref, 'refs/tags/v') }}
      run: |
        set -euo pipefail

        TAG_VERSION="${GITHUB_REF_NAME#v}"
        MANIFEST_VERSION="${{ steps.version.outputs.version }}"

        if [ "$TAG_VERSION" != "$MANIFEST_VERSION" ]; then
          echo "::error::Tag ${GITHUB_REF_NAME} does not match manifest version ${MANIFEST_VERSION}."
          exit 1
        fi

        TAG_OBJECT_TYPE=$(git cat-file -t "refs/tags/${GITHUB_REF_NAME}")
        if [ "$TAG_OBJECT_TYPE" != "tag" ]; then
          echo "::error::Release tags must be annotated tags. Create one with: git tag -a ${GITHUB_REF_NAME} -m 'Release ${GITHUB_REF_NAME}'"
          exit 1
        fi

        git fetch origin main --prune
        if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
          echo "::error::Release tag ${GITHUB_REF_NAME} must point to a commit already merged into origin/main."
          exit 1
        fi
        
    - name: Lint extension
      run: |
        echo "Running web-ext lint..."
        web-ext lint --source-dir=. --ignore-files=README.md,LICENSE,.github/
        
    - name: Build Firefox extension
      run: |
        echo "Building Firefox extension..."
        web-ext build --source-dir=. --artifacts-dir=./dist --ignore-files=README.md,LICENSE,.github/ --overwrite-dest
        
        # Rename the built file for clarity
        cd dist
        BUILT_FILE=$(ls *.zip | head -n 1)
        mv "$BUILT_FILE" "yt-gemini-summarizer-firefox-v${{ steps.version.outputs.version }}.zip"
        echo "Firefox package created: yt-gemini-summarizer-firefox-v${{ steps.version.outputs.version }}.zip"
        
        # List contents for verification
        echo "Package contents:"
        unzip -l "yt-gemini-summarizer-firefox-v${{ steps.version.outputs.version }}.zip"
        
    - name: Upload Firefox extension artifact
      uses: actions/upload-artifact@v4
      with:
        name: firefox-extension-v${{ steps.version.outputs.version }}
        path: dist/yt-gemini-summarizer-firefox-v${{ steps.version.outputs.version }}.zip
        retention-days: 30

    - name: Submit listed version to AMO
      if: ${{ startsWith(github.ref, 'refs/tags/v') }}
      env:
        AMO_JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
        AMO_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}
        RELEASE_NOTES_FILE: release-notes/v${{ steps.version.outputs.version }}.md
      run: |
        set -euo pipefail

        if [ -z "${AMO_JWT_ISSUER}" ] || [ -z "${AMO_JWT_SECRET}" ]; then
          echo "::error::AMO_JWT_ISSUER and AMO_JWT_SECRET repository secrets are required to publish to AMO."
          exit 1
        fi

        metadata_args=()
        if [ -s "${RELEASE_NOTES_FILE}" ]; then
          python3 -c 'import json, os, pathlib; notes = pathlib.Path(os.environ["RELEASE_NOTES_FILE"]).read_text(encoding="utf-8"); json.dump({"release_notes": {"en-US": notes}}, open("amo-metadata.json", "w", encoding="utf-8"), ensure_ascii=False)'
          metadata_args+=(--amo-metadata=amo-metadata.json)
        fi

        web-ext sign \
          --source-dir=. \
          --artifacts-dir=./signed \
          --ignore-files=README.md,LICENSE,.github/ \
          --channel=listed \
          --api-key="$AMO_JWT_ISSUER" \
          --api-secret="$AMO_JWT_SECRET" \
          --approval-timeout=0 \
          --no-input \
          "${metadata_args[@]}"

    - name: Upload signed Firefox extension artifact if available
      if: ${{ startsWith(github.ref, 'refs/tags/v') }}
      uses: actions/upload-artifact@v4
      with:
        name: signed-firefox-extension-v${{ steps.version.outputs.version }}
        path: signed/
        if-no-files-found: ignore
        retention-days: 30
        
    - name: Upload build summary
      uses: actions/upload-artifact@v4
      with:
        name: build-info-v${{ steps.version.outputs.version }}
        path: |
          manifest.json
          dist/
        retention-days: 30
